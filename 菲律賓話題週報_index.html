// ====== 平台元資料 ======

  tiktok:    { label: "TikTok",   class: "source-tiktok" },
  facebook:  { label: "FB",       class: "source-facebook" },
  instagram: { label: "IG",       class: "source-instagram" },
  x:         { label: "X",        class: "source-x" },
  youtube:   { label: "YouTube",  class: "source-youtube" },
  reddit:    { label: "Reddit",   class: "source-reddit" },
  rappler:   { label: "Rappler",  class: "source-news" },
  inquirer:  { label: "Inquirer", class: "source-news" },
  gma:       { label: "GMA",      class: "source-news" },
  abscbn:    { label: "ABS-CBN",  class: "source-news" },
  pep:       { label: "PEP.ph",   class: "source-vertical" },
  spot:      { label: "Spot.ph",  class: "source-vertical" },
  oneesports:{ label: "OneEsports",class: "source-vertical" },
  vertical:  { label: "Other",    class: "source-vertical" },
  other:     { label: "Other",    class: "source-other" }
};

const CATEGORY_META = {
  social:        { label: "社群", class: "badge-social" },
  entertainment: { label: "娛樂", class: "badge-entertainment" },
  gaming:        { label: "遊戲", class: "badge-gaming" }
};

// ====== 狀態 ======
const state = {
  currentWeek: null,
  filterCategory: "all",
  filterBreaking: false,
  filterMeme: false,
  expandedIds: new Set()
};

// ====== 工具函數 ======
function formatDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString("zh-TW", { month: "numeric", day: "numeric" });
}

function sourceChipHtml(source, withDate = false) {
  const meta = PLATFORM_META[source.platform] || PLATFORM_META.other;
  const label = source.name || meta.label;
  const dateStr = withDate && source.date ? ` ${formatDate(source.date)}` : "";
  return `<span class="source-chip ${meta.class}">${label} ${source.role}${dateStr}</span>`;
}

// ====== 渲染卡片 ======
function renderCard(card) {
  const isExpanded = state.expandedIds.has(card.id);
  const catMeta = CATEGORY_META[card.category] || CATEGORY_META.social;

  const badgesHtml = [];
  if (card.badges.includes("breaking")) badgesHtml.push('<span class="badge badge-breaking">爆</span>');
  if (card.badges.includes("meme")) badgesHtml.push('<span class="badge badge-meme">純梗</span>');
  badgesHtml.push(`<span class="badge ${catMeta.class}">${catMeta.label}</span>`);

  const maxSourcesCollapsed = 6;
  const sourceChipsAll = card.sources.map(s => sourceChipHtml(s, false));
  let sourceChipsHtml = sourceChipsAll.slice(0, maxSourcesCollapsed).join("");
  if (sourceChipsAll.length > maxSourcesCollapsed) {
    sourceChipsHtml += `<span class="source-chip source-other">+${sourceChipsAll.length - maxSourcesCollapsed} more</span>`;
  }

  let detailHtml = "";
  if (isExpanded) {
    const sourceChipsExpanded = card.sources.map(s => sourceChipHtml(s, true)).join("");
    const keywordsHtml = (card.keywords || []).map(k => `<code class="keyword-chip">${k}</code>`).join("");
    detailHtml = `
      <div class="detail-block">
        <div class="detail-section">
          <div class="detail-label">這是什麼</div>
          <div class="detail-text">${card.detail.what}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">為什麼紅</div>
          <div class="detail-text">${card.detail.why_viral}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">具體熱度</div>
          <div class="detail-text">${card.detail.metrics}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">行銷可用性</div>
          <div class="detail-text">${card.detail.marketing_angle}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">來源平台（含日期）</div>
          <div class="sources-row">${sourceChipsExpanded}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">搜尋關鍵字</div>
          <div>${keywordsHtml}</div>
        </div>
      </div>
    `;
  }

  return `
    <article class="card ${isExpanded ? 'expanded' : ''}" data-id="${card.id}">
      <div class="card-badges">
        ${badgesHtml.join("")}
        <span class="heat-score">熱度 ${card.heat_score}</span>
      </div>
      <h2 class="card-title">${card.title}</h2>
      <p class="card-summary">${card.summary}</p>
      ${!isExpanded ? `
        <div class="sources-row">
          <span class="sources-label">來源：</span>
          ${sourceChipsHtml}
        </div>
      ` : ''}
      ${detailHtml}
      <div class="card-footer">
        ${isExpanded ? `
          <button class="small-btn" data-action="copy" data-id="${card.id}">📋 複製全文</button>
          <button class="small-btn" data-action="collapse" data-id="${card.id}">收合 ▴</button>
        ` : `
          <button class="small-btn" data-action="expand" data-id="${card.id}">展開 ▾</button>
        `}
      </div>
    </article>
  `;
}

function getFilteredCards() {
  const week = DATA[state.currentWeek];
  if (!week) return [];
  let cards = [...week.cards];

  if (state.filterCategory !== "all") {
    cards = cards.filter(c => c.category === state.filterCategory);
  }
  if (state.filterBreaking) {
    cards = cards.filter(c => c.badges.includes("breaking"));
  }
  if (state.filterMeme) {
    cards = cards.filter(c => c.badges.includes("meme"));
  }
  cards.sort((a, b) => b.heat_score - a.heat_score);
  return cards;
}

function render() {
  const week = DATA[state.currentWeek];
  if (!week) return;

  const weeks = Object.keys(DATA).sort().reverse();
  const isHistory = state.currentWeek !== weeks[0];

  // Meta
  const cards = getFilteredCards();
  const totalCards = week.cards.length;
  const metaEl = document.getElementById("weekMeta");
  let metaText = `${week.period}｜${totalCards} 張卡片`;
  if (cards.length !== totalCards) metaText += `｜篩選後顯示 ${cards.length} 張`;
  metaEl.innerHTML = metaText + (isHistory ? '<span class="history-tag">（檢視歷史週）</span>' : '');

  // Refresh button state
  const refreshBtn = document.getElementById("refreshBtn");
  refreshBtn.disabled = isHistory;

  // Cards
  const listEl = document.getElementById("cardsList");
  if (cards.length === 0) {
    listEl.innerHTML = '<div class="empty-state">目前篩選條件下沒有符合的卡片。試著解除一些篩選？</div>';
  } else {
    listEl.innerHTML = cards.map(renderCard).join("");
  }

  // Last updated
  document.getElementById("lastUpdated").textContent =
    `最近更新：${new Date(week.updated_at).toLocaleString("zh-TW")}`;
}

// ====== 初始化 ======
function init() {
  const weeks = Object.keys(DATA).sort().reverse();
  state.currentWeek = weeks[0];

  // Week selector
  const sel = document.getElementById("weekSelector");
  sel.innerHTML = weeks.map((w, i) => {
    const label = i === 0 ? `本週 (${w})` : i === 1 ? `上週 (${w})` : `${i} 週前 (${w})`;
    return `<option value="${w}">${label}</option>`;
  }).join("");
  sel.value = state.currentWeek;
  sel.addEventListener("change", e => {
    state.currentWeek = e.target.value;
    state.expandedIds.clear();
    render();
  });

  // Category filters
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.filterCategory = btn.dataset.category;
      render();
    });
  });

  // Badge filters
  document.getElementById("filterBreaking").addEventListener("change", e => {
    state.filterBreaking = e.target.checked;
    render();
  });
  document.getElementById("filterMeme").addEventListener("change", e => {
    state.filterMeme = e.target.checked;
    render();
  });

  // Card actions (delegated)
  document.getElementById("cardsList").addEventListener("click", e => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    const id = btn.dataset.id;
    const action = btn.dataset.action;
    if (action === "expand") {
      state.expandedIds.add(id);
      render();
    } else if (action === "collapse") {
      state.expandedIds.delete(id);
      render();
    } else if (action === "copy") {
      const card = DATA[state.currentWeek].cards.find(c => c.id === id);
      const text = formatCardAsText(card);
      copyToClipboard(text, "已複製卡片全文到剪貼簿");
    }
  });

  // Refresh modal
  document.getElementById("refreshBtn").addEventListener("click", () => {
    document.getElementById("refreshModal").classList.remove("hidden");
  });
  document.getElementById("closeModalBtn").addEventListener("click", () => {
    document.getElementById("refreshModal").classList.add("hidden");
  });
  document.getElementById("copyPromptBtn").addEventListener("click", () => {
    copyToClipboard("請更新本週菲律賓話題週報", "指令已複製，請貼到 Cowork 對話視窗");
    document.getElementById("refreshModal").classList.add("hidden");
  });
  document.getElementById("refreshModal").addEventListener("click", e => {
    if (e.target.id === "refreshModal") {
      e.currentTarget.classList.add("hidden");
    }
  });

  render();
}

function formatCardAsText(card) {
  const sources = card.sources.map(s => `${(PLATFORM_META[s.platform] || PLATFORM_META.other).label} ${s.role}（${formatDate(s.date)}）`).join("、");
  return `【${card.title}】

▌摘要
${card.summary}

▌這是什麼
${card.detail.what}

▌為什麼紅
${card.detail.why_viral}

▌具體熱度
${card.detail.metrics}

▌行銷可用性
${card.detail.marketing_angle}

▌來源平台
${sources}

▌搜尋關鍵字
${(card.keywords || []).join(" / ")}

—— 菲律賓話題週報 ${DATA[state.currentWeek].period} ——`;
}

function copyToClipboard(text, toastMsg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast(toastMsg));
  } else {
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); showToast(toastMsg); }
    catch (e) { showToast("複製失敗，請手動選取"); }
    document.body.removeChild(ta);
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
